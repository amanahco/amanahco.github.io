<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Amanah Collective | Founding Member Access</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Bodoni+Moda:ital,wght@0,400;1,700&family=Inter:wght@200;400;600&display=swap');
        :root { --alabaster: #F9F8F6; --olive-deep: #3D4435; }
        body { font-family: 'Inter', sans-serif; background-color: var(--alabaster); color: var(--olive-deep); }
        .serif { font-family: 'Bodoni+Moda', serif; }
        .arch-card { border-radius: 120px 120px 0 0; border: 1px solid rgba(61, 68, 53, 0.1); }
        .logo-fade { animation: fadeIn 2s ease-in; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

    <header class="p-10 bg-white text-center border-b border-gray-50">
        <div class="inline-flex flex-col items-center">
            <img src="IMG_2517.png" alt="Amanah Collective Logo" class="w-48 h-auto mb-2 logo-fade">
            <p class="text-[10px] tracking-[0.4em] uppercase opacity-40">Collective</p>
        </div>
    </header>

    <main class="max-w-md mx-auto px-6 pt-10 pb-32">
        
        <section class="text-center">
            <div class="arch-card bg-white p-6 mb-8 shadow-sm">
                <h2 class="serif text-2xl italic mb-4">Founding Member</h2>
                <div class="w-8 h-px bg-olive-deep/20 mx-auto mb-6"></div>
                <p class="text-xs leading-loose opacity-70 mb-8 px-4">
                    Join the Amanah Circle. Your £25 contribution fuels our specialist sourcing in Turkey and secures your lifetime status as a Founding Member.
                </p>
                
                <div class="flex justify-between items-center px-6 mb-6">
                    <span class="text-[10px] tracking-widest uppercase opacity-40">Entry Tier</span>
                    <span class="text-xl font-light tracking-tighter">£25.00</span>
                </div>

                <a href="https://buy.stripe.com/9B63cv7LP6Sq8Sk59q6Vq0"
                   class="block w-full bg-[#3D4435] text-white py-5 text-[10px] tracking-[0.3em] uppercase hover:bg-black transition-all shadow-lg">
                    JOIN THE COLLECTIVE
                </a>
            </div>

            <p class="text-[9px] uppercase tracking-widest opacity-30 italic">
                © 2026 Amanah Co. & Gemini Collaboration. All Rights Reserved.
            </p>
        </section>

    </main>

    <footer class="fixed bottom-0 left-0 w-full bg-white/80 backdrop-blur-md p-6 flex justify-around text-[9px] tracking-widest uppercase opacity-40 border-t border-gray-100">
        <span>Artisanal</span>
        <span>Ethical</span>
        <span>Legacy</span>
    </footer>

</body>
</html>
