<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Amanah Collective Ltd | Humble Luxury</title>
    <style>
        /* Amanah Collective Core Styles */
        body {
            margin: 0;
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background-color: #F4F1EA; /* Warm Alabaster */
            color: #2C2C2C;
            line-height: 1.6;
        }
        .header {
            padding: 24px 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .logo {
            font-size: 1.5rem;
            font-weight: bold;
            font-family: 'Georgia', serif; /* Elegant Serif for Logo */
            color: #4B5320; /* Deep Olive Green */
        }
        .btn-primary {
            background-color: #4B5320;
            color: #F4F1EA;
            padding: 10px 24px;
            text-decoration: none;
            border-radius: 4px;
            font-weight: 500;
            transition: background 0.3s ease;
        }
        .btn-primary:hover {
            background-color: #3A4018;
        }
        .hero {
            padding: 80px 5%;
            text-align: center;
            max-width: 800px;
            margin: 0 auto;
        }
        .hero h1 {
            font-family: 'Georgia', serif;
            font-size: 3rem;
            margin-bottom: 16px;
            color: #4B5320;
        }
        .hero p {
            font-size: 1.2rem;
            color: #555;
            margin-bottom: 32px;
        }
        .footer {
            text-align: center;
            padding: 40px 20px;
            font-size: 0.85rem;
            color: #666;
            margin-top: 50px;
        }
    </style>
</head>
<body>

    <header class="header">
        <div class="logo">Amanah Collective</div>
        <a href="#waitlist" class="btn-primary">Join Waitlist</a>
    </header>

    <section class="hero">
        <h1>Redefining Quality. Rooted in Trust.</h1>
        <p>Humble luxury and uncompromising ethics. Join the journey as we build our digital ecosystem.</p>
        <a href="#waitlist" class="btn-primary">Secure Early Access</a>
    </section>

    <footer class="footer">
        <p>Contact Us | Privacy Policy | Terms of Service</p>
        <p>© 2026 Amanah Co. & Gemini Collaboration. All Rights Reserved.</p>
    </footer>

</body>
</html>
